document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

v class=\"mlabel\">Tools<\u002Fdiv><div class=\"mval\">{{ project.toolstr }}<\u002Fdiv><\u002Fdiv><\u002Fdiv><sc-for list=\"{{ project.coverList }}\" as=\"c\" hint-placeholder-count=\"0\"><sc-if value=\"{{ c }}\" hint-placeholder-val=\"{{ false }}\"><img class=\"coverimg zoomable\" src=\"{{ c }}\" alt=\"{{ project.title }}\" onclick=\"{{ openLightbox }}\"><\u002Fsc-if><\u002Fsc-for><sc-if value=\"{{ project.noCover }}\" hint-placeholder-val=\"{{ true }}\"><div class=\"ph cover\"><span class=\"ph-label\">{{ project.cover }}<\u002Fspan><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ project.playable }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"playwrap\"><div class=\"fx ac jb wrap gap12 playhead\"><div><div class=\"psec-h\" style=\"color:var(--green)\">Play it in the browser<\u002Fdiv><div class=\"playnote\">Runs in-page · loads ~74&nbsp;MB · headphones recommended 🎧<\u002Fdiv><\u002Fdiv><button class=\"playbtn2\" onclick=\"{{ project.toggleGame }}\">{{ project.gameBtnLabel }}<\u002Fbutton><\u002Fdiv><div class=\"playstage\"><sc-for list=\"{{ project.gameSrcList }}\" as=\"src\" hint-placeholder-count=\"0\"><iframe class=\"gameframe\" src=\"{{ src }}\" title=\"Pawtion Shop\" allow=\"autoplay; fullscreen; gamepad\"><\u002Fiframe><\u002Fsc-for><sc-if value=\"{{ project.gameOff }}\" hint-placeholder-val=\"{{ true }}\"><button class=\"playposter\" onclick=\"{{ project.toggleGame }}\"><sc-for list=\"{{ project.coverList }}\" as=\"c\" hint-placeholder-count=\"0\"><img class=\"posterimg\" src=\"{{ c }}\" alt=\"Pawtion Shop\"><\u002Fsc-for><span class=\"playbadge\">▶ Play<\u002Fspan><\u002Fbutton><\u002Fsc-if><\u002Fdiv><\u002Fdiv><\u002Fsc-if><div class=\"psec\"><div class=\"psec-h\">Overview<\u002Fdiv><div class=\"ptext\"><p>{{ project.overview }}<\u002Fp><p class=\"muted\">{{ project.overview2 }}<\u002Fp><\u002Fdiv><\u002Fdiv><div class=\"psec\"><div class=\"psec-h\">The problem<\u002Fdiv><div class=\"ptext\"><p>{{ project.problem }}<\u002Fp><\u002Fdiv><\u002Fdiv><div class=\"psec\"><div class=\"psec-h\">Process<\u002Fdiv><div><sc-for list=\"{{ project.approach }}\" as=\"a\" hint-placeholder-count=\"3\"><div class=\"step\"><span class=\"stepn\">{{ a.n }}<\u002Fspan><div><div class=\"steptitle\">{{ a.title }}<\u002Fdiv><div class=\"stepbody\">{{ a.body }}<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsc-for><sc-if value=\"{{ project.galCarousel }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"carousel\"><div class=\"carstage\"><sc-for list=\"{{ project.slideList }}\" as=\"s\" hint-placeholder-count=\"1\"><figure class=\"carfig\"><sc-if value=\"{{ s.img }}\" hint-placeholder-val=\"{{ false }}\"><img class=\"carimg zoomable\" src=\"{{ s.img }}\" alt=\"{{ s.label }}\" onclick=\"{{ openLightbox }}\"><\u002Fsc-if><\u002Ffigure><\u002Fsc-for><\u002Fdiv><div class=\"fx ac jb carbar\"><button class=\"carbtn\" onclick=\"{{ project.slidePrev }}\">← Prev<\u002Fbutton><div class=\"carmeta\"><span class=\"carcount\">{{ project.slideNum }} / {{ project.slideTotal }}<\u002Fspan><span class=\"carcap\">{{ project.slide.label }}<\u002Fspan><\u002Fdiv><button class=\"carbtn\" onclick=\"{{ project.slideNext }}\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ project.galStack }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"galstack\"><sc-for list=\"{{ project.stackRows }}\" as=\"r\" hint-placeholder-count=\"5\"><div class=\"{{ r.cls }}\"><sc-for list=\"{{ r.items }}\" as=\"g\" hint-placeholder-count=\"1\"><figure class=\"galfigfull\"><sc-if value=\"{{ g.img }}\" hint-placeholder-val=\"{{ false }}\"><img class=\"galimgfull zoomable\" src=\"{{ g.img }}\" alt=\"{{ g.label }}\" onclick=\"{{ openLightbox }}\"><\u002Fsc-if><figcaption class=\"galcap\">{{ g.label }}<\u002Ffigcaption><\u002Ffigure><\u002Fsc-for><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ project.galGrid }}\" hint-placeholder-val=\"{{ true }}\"><div class=\"gal\" style=\"margin-top:30px\"><sc-for list=\"{{ project.galleryItems }}\" as=\"g\" hint-placeholder-count=\"2\"><div class=\"galcell\"><sc-if value=\"{{ g.img }}\" hint-placeholder-val=\"{{ false }}\"><figure class=\"galfig\"><img class=\"galimg zoomable\" src=\"{{ g.img }}\" alt=\"{{ g.label }}\" onclick=\"{{ openLightbox }}\"><figcaption class=\"galcap\">{{ g.label }}<\u002Ffigcaption><\u002Ffigure><\u002Fsc-if><sc-if value=\"{{ g.noImg }}\" hint-placeholder-val=\"{{ true }}\"><div class=\"ph galph\"><span class=\"ph-label\">{{ g.label }}<\u002Fspan><\u002Fdiv><\u002Fsc-if><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fsc-if><\u002Fdiv><\u002Fdiv><div class=\"psec\"><div class=\"psec-h\">Outcome<\u002Fdiv><div class=\"ptext\"><p>{{ project.outcome }}<\u002Fp><\u002Fdiv><\u002Fdiv><div class=\"psec\" style=\"border-bottom:1px solid var(--line)\"><div class=\"psec-h\">Impact<\u002Fdiv><div class=\"metrics\"><sc-for list=\"{{ project.metrics }}\" as=\"m\" hint-placeholder-count=\"3\"><div class=\"metric\"><div class=\"metricv\">{{ m.value }}<\u002Fdiv><div class=\"metricl\">{{ m.label }}<\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fdiv><div class=\"nextp\" onclick=\"{{ openNext }}\"><div><div class=\"mlabel\">Next project<\u002Fdiv><div class=\"nextt\">{{ nextProject.title }}<\u002Fdiv><\u002Fdiv><span class=\"display\" style=\"font-size:clamp(30px,4vw,52px);color:var(--faint)\">→<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsc-if><sc-for list=\"{{ lightboxList }}\" as=\"lb\" hint-placeholder-count=\"0\"><div class=\"lightbox\" onclick=\"{{ closeLightbox }}\"><span class=\"lbclose\">×<\u002Fspan><img class=\"lightboximg\" src=\"{{ lb }}\" alt=\"\"><\u002Fdiv><\u002Fsc-for><div class=\"foot\"><div class=\"wrap fx ac jb wrap gap16\"><span class=\"foottxt\">© {{ year }} Geovana Holaten — Designer<\u002Fspan><span class=\"foottxt\">Built &amp; designed by Geovana · {{ year }}<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { route: 'home', slug: null, filter: 'All', slide: 0, lightbox: null };\n\n  projects = [\n    { slug:'lumen-game', category:'Game', tagcls:'tag-green', year:'2026', role:'Game Design & UI/UX',  tools:['Godot Engine','Affinity','AI-assisted (vibe coding)','Localization'],\n      title:'Pawtion Shop - a cozy potion making game', tagline:'Game design, UI/UX and art direction for a cozy time-management game where a red panda runs a magic potion shop.',\n      cover:'Pawtion Shop — title & gameplay · 1600×1000',\n      galStack:true,\n      playable:true,\n      coverImg:'images/pawtion/title.png',\n      thumbImg:'images/pawtion/title.png',\n      galleryImgs:[\n        {img:'images/pawtion/gameplay.png',label:'Gameplay — brew, stir and serve animal customers'},\n        {img:'images/pawtion/title.png',label:'Title screen & branding'}],\n      overview:'Pawtion Shop is a time-management game where a red panda runs a magic potion shop for animal customers — dogs, cats, rabbits and more. Each customer orders a specific potion; the player brews it in time or loses reputation. The name itself does design work — \"Pawtion\" signals cute, pet-themed and alchemy-based in a single word.',\n      overview2:'I directed all design, mechanics, pacing and content, and shipped in Portuguese (BR) and English from day one through a central localization system. Every illustration — characters, potions, backgrounds and UI art — was hand-drawn by me in Affinity.',\n      problem:'A cozy game still needs tension and depth. The challenge was teaching a multi-step brewing loop, keeping 40 levels from feeling repetitive, and turning failure into a low-stakes, charming moment rather than a punishment.',\n      approach:[\n        {n:'01',title:'Core loop & memory layer',body:'Drag-and-drop ingredients into the cauldron, brew, stir to speed up. Recipes need 2–3 exact ingredients; customers are grouped by species with their own recipe pool, adding pattern-recognition without tutorial text.'},\n        {n:'02',title:'Learn by doing',body:'A fairy and the panda guide onboarding, but most steps unpause the game and require a real action — build, brew, stir, deliver — so players finish having actually played.'},\n        {n:'03',title:'Pacing & ownership',body:'Progression runs on money, reputation and level, with daily events (rainy days, rush hour, promos) shifting the rules. A cosmetic \"Cozy Decor\" upgrade track builds attachment to the shop itself.'}],\n      outcome:'A complete, bilingual cozy game built in Godot. Wrong combinations produce a throw-away \"bad potion\" instead of an error, and each level ends with a shareable results card designed to look good as a screenshot.',\n      metrics:[{value:'40',label:'levels of play'},{value:'2',label:'languages at launch — PT-BR & EN'},{value:'Godot',label:'engine, AI-assisted build'}] },\n\n    { slug:'fictive-reality', category:'UX/UI', tagcls:'tag-blue', year:'2023', role:'UX/UI Designer (Intern)', tools:['Figma','FigJam'],\n      title:'Fictive Reality', tagline:'Refining a gamified learning platform — interactive talking avatars powered by AI.',\n      cover:'Fictive Reality — results & game · 1600×1000',\n      galStack:true,\n      coverImg:'images/fictive/results.png',\n      thumbImg:'images/fictive/results.png',\n      galleryImgs:[\n        {img:'images/fictive/results.png',label:'Results — website report & in-game overlay'},\n        {img:'images/fictive/flow.png',label:'User-flow mapping in FigJam'}],\n      overview:'Fictive Reality is a Stockholm-based startup specializing in gamified learning: interactive talking avatars powered by AI that make training more effective. I joined in August 2023 as a UX/UI Designer intern, working in an agile, cross-functional team.',\n      overview2:'My role was to update existing Figma models and design a new results page, settings and layout for the game, plus a new chat box for the website — accounting for accessibility throughout.',\n      problem:'Fictive Reality runs a game embedded in a website, so the training experience was split across two systems with inconsistent patterns. The challenge was to refine key elements of both and integrate them into one coherent, accessible experience.',\n      approach:[\n        {n:'01',title:'Explore & update',body:'Started by testing and updating the existing Figma files to learn the system and spot what could be improved before suggesting changes.'},\n        {n:'02',title:'Design across surfaces',body:'Designed the results page, settings and game layout, plus a new website chat box — always aligning suggestions with team feedback and accessibility.'},\n        {n:'03',title:'Map the user flow',body:'Built and analysed user-flow maps to drive collaborative discussions and pinpoint usability improvements ahead of the design phase.'}],\n      gallery:['Redesigned results — website & game · 1200×900','User-flow maps · 1200×900'],\n      outcome:'The redesign integrated the website and game training results into a single, easier-to-understand experience — built on the existing style of both and refined through continuous team feedback and accessibility checks.',\n      metrics:[{value:'2',label:'surfaces designed — website + game'},{value:'Agile',label:'cross-functional team'},{value:'A11y',label:'accessibility throughout'}] },\n\n    { slug:'riedia', category:'UX/UI', tagcls:'tag-blue', year:'2023', role:'UI/UX Designer (Intern)', tools:['Figma','Adobe XD','Photoshop'],\n      title:'Riedia — Rewards & App', tagline:'“Read local news anywhere, in any language” — a new rewards page and app redesign.',\n      cover:'Riedia — Rewards page & app · 1600×1000',\n      galStack:true,\n      coverImg:'images/riedia/rewards-redesign.png',\n      thumbImg:'images/riedia/rewards-live.png',\n      galleryImgs:[\n        {img:'images/riedia/sketches.png',label:'Early wireframe sketches'},\n        {img:'images/riedia/app-flow.png',label:'App exploration & user flow'},\n        {img:'images/riedia/rewards-live.png',label:'Rewards page — first live version'},\n        {img:'images/riedia/newsletter-frames.png',label:'Newsletter — reward frames'},\n        {img:'images/riedia/rewards-proto.gif',label:'Rewards prototype — animated',row:'r1'},\n        {img:'images/riedia/newsletter-email.png',label:'Referral newsletter email',row:'r1'}],\n      overview:'Riedia helps people read local news anywhere, in any language. I joined in January 2023 as a UI/UX Designer intern, designing the new Rewards page from concept to delivery and improving the existing app through research.',\n      overview2:'Unlike my study projects, Riedia was a live product — so I began with a comprehensive study of the company\\u2019s design ecosystem and competitors before contributing.',\n      problem:'The team had brainstormed a Rewards feature but had no design yet, and the app needed to feel more modern and intuitive. I had to design within a live product and the tech team\\u2019s build constraints.',\n      approach:[\n        {n:'01',title:'Design the Rewards page',body:'Created the new Rewards page from the team\\u2019s brainstorm, testing mockups per platform and aligning with what the tech team could build. A newsletter call-to-action followed.'},\n        {n:'02',title:'Improve the app',body:'Worked in existing files, adding pages and functionality from colleagues\\u2019 suggestions, then ran usability testing and iterated.'},\n        {n:'03',title:'User research',body:'Ran qualitative research — 20 interviews with international residents in Sweden — translating their motivations and problems into app improvements.'}],\n      gallery:['Rewards page — mockup & live · 1200×900','App redesign screens · 1200×900'],\n      outcome:'The Rewards page shipped to the Riedia site and the daily newsletter, and the redesigned app — modern UI, streamlined navigation, research-driven features — launched in May 2023.',\n      metrics:[{value:'20',label:'users interviewed in Sweden'},{value:'May 2023',label:'app version launched'},{value:'1',label:'new Rewards page shipped'}] },\n\n    { slug:'dcc-brand', category:'Graphic Design', tagcls:'tag-green', year:'2022', role:'Brand & Visual Designer', tools:['Adobe Illustrator','Research'],\n      title:'DCC — Distrito Criativo de Curitiba', tagline:'Logo and brand manual for Curitiba\\u2019s Creative District.',\n      cover:'DCC — brand manual · 1600×1000',\n      galCarousel:true,\n      coverImg:'images/dcc/cover.png',\n      thumbImg:'images/dcc/card-thumb.png',\n      galleryImgs:[\n        {img:'images/dcc/bm1.png',label:'Brand manual — cover'},\n        {img:'images/dcc/bm2.png',label:'O Distrito'},\n        {img:'images/dcc/bm3.png',label:'The mark'},\n        {img:'images/dcc/bm4.png',label:'Black & white usage'},\n        {img:'images/dcc/bm5.png',label:'Clear space'},\n        {img:'images/dcc/bm6.png',label:'What not to do'},\n        {img:'images/dcc/bm7.png',label:'Minimum size'},\n        {img:'images/dcc/bm8.png',label:'Typography — Gotham'},\n        {img:'images/dcc/bm9.png',label:'Color — primary & events'},\n        {img:'images/dcc/bm10.png',label:'Color — parks & gastronomy'},\n        {img:'images/dcc/bm11.png',label:'Wayfinding signage'},\n        {img:'images/dcc/bm12.png',label:'Window decals'}],\n      overview:'Studies and a brand manual for the Distrito Criativo de Curitiba (Curitiba\\u2019s Creative District). I led the research and built every graphic element in Adobe Illustrator.',\n      overview2:'The project is entirely in Portuguese, but the visual work speaks for itself — happy to walk through any details.',\n      problem:'The Distrito Criativo de Curitiba needed a distinctive visual identity and a manual to keep it consistent across every application.',\n      approach:[\n        {n:'01',title:'Research',body:'Studied the district\\u2019s context and references to ground the identity in something authentic.'},\n        {n:'02',title:'Build the identity',body:'Designed the logo and the full graphic system in Adobe Illustrator.'},\n        {n:'03',title:'Document',body:'Compiled the studies and usage rules into a complete brand manual.'}],\n      gallery:['Logo studies · 1200×900','Brand manual pages · 1200×900'],\n      outcome:'A complete logo and brand manual for the Distrito Criativo de Curitiba, delivering a cohesive visual identity ready to apply across the district\\u2019s materials.',\n      metrics:[{value:'1',label:'complete brand manual'},{value:'Illustrator',label:'fully built in'},{value:'PT-BR',label:'project language'}] },\n  ];\n\n  skills = ['User research','Interaction design','UI design','Design systems','Prototyping','Brand identity','Game UI/UX','Figma','Usability testing','Art direction'];\n\n  experience = [\n    { year:'2025 — Now', role:'Clipper (Freelance)', company:'Streaming post-production', place:'Stockholm, SE',\n      desc:'Curating and selecting scenes in the post-production of films and series for a streaming service.' },\n    { year:'2024 — 2025', role:'Logistics Coordinator', company:'Sniph', place:'Stockholm, SE',\n      desc:'Planned and coordinated monthly shipments to subscribers and e-commerce customers — daily dispatch, decanting and careful packaging of perfume bottles to safety and quality standards.' },\n    { year:'2023', role:'UX/UI Designer Intern', company:'Fictive Reality', place:'Stockholm, SE',\n      desc:'Research and design solutions for the platform and web interface; built Figma models to discover and implement the best solutions for users\\u2019 needs.' },\n    { year:'2023', role:'UX/UI Designer Intern', company:'Riedia', place:'Stockholm, SE',\n      desc:'User-centered design with the Double Diamond approach — competitor research, user testing and interactive Figma prototypes for user-friendly final products.' },\n  ];\n\n  education = [\n    { year:'2022', role:'Google UX Design Certificate', company:'Online', place:'Coursera',\n      desc:'Entry-level job-readiness training across 15 modules — UX research fundamentals, inclusive design, low- and high-fidelity prototyping, and tools like Figma and Adobe XD.' },\n    { year:'2018 — 2019', role:'Graduate Studies — Organizational Marketing', company:'FAEL', place:'Lapa, BR', desc:'' },\n    { year:'2017 — 2018', role:'Graduation — Visual Arts', company:'Claretiano', place:'Curitiba, BR', desc:'' },\n    { year:'2011 — 2016', role:'Graduation — Graphic Design', company:'UTFPR — Federal University of Technology', place:'Curitiba, BR', desc:'' },\n  ];\n\n  componentDidMount(){\n    this._onHash = () => this.readHash();\n    window.addEventListener('hashchange', this._onHash);\n    this.readHash();\n  }\n  componentWillUnmount(){ window.removeEventListener('hashchange', this._onHash); }\n  componentDidUpdate(_, prev){\n    if (prev.slug !== this.state.slug && this.state.route === 'project') window.scrollTo({ top: 0 });\n  }\n  readHash(){\n    const h = window.location.hash || '';\n    if (h.indexOf('#/p/') === 0){\n      const slug = h.slice(4);\n      if (this.projects.some(p => p.slug === slug)){ this.setState({ route:'project', slug }); return; }\n    }\n    this.setState({ route:'home', slug:null });\n  }\n  open(slug){ this.setState({ slide: 0, gameOn: false }); window.location.hash = '#/p/' + slug; }\n  goHome(){ this.setState({ route:'home', slug:null }); window.scrollTo({ top:0 }); if (window.location.hash) history.replaceState(null,'',window.location.pathname + window.location.search); }\n  goSection(id){\n    const scroll = () => { const el = document.getElementById(id); if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 76, behavior:'smooth' }); };\n    if (this.state.route === 'project'){\n      if (window.location.hash) history.replaceState(null,'',window.location.pathname + window.location.search);\n      this.setState({ route:'home', slug:null }, () => setTimeout(scroll, 70));\n    } else scroll();\n  }\n\n  renderVals(){\n    const filters = ['All','UX/UI','Graphic Design','Game'];\n    const active = this.state.filter;\n    const shown = this.projects.filter(p => active === 'All' || p.category === active);\n    const projects = shown.map((p) => {\n      const idx = this.projects.indexOf(p);\n      return { ...p, num: String(idx+1).padStart(2,'0'), thumbList: p.thumbImg ? [p.thumbImg] : [], noThumb: !p.thumbImg, open: () => this.open(p.slug) };\n    });\n    const cur = this.projects.find(p => p.slug === this.state.slug) || null;\n    let project = null, nextProject = null, openNext = () => {};\n    if (cur){\n      const i = this.projects.indexOf(cur);\n      const nx = this.projects[(i+1) % this.projects.length];\n      const galleryItems = cur.galleryImgs\n        ? cur.galleryImgs.map(g => ({ img: g.img, label: g.label, noImg: false, row: g.row || null }))\n        : (cur.gallery || []).map(label => ({ img: null, label, noImg: true, row: null }));\n      const stackRows = [];\n      galleryItems.forEach(it => {\n        const last = stackRows[stackRows.length - 1];\n        if (it.row && last && last.row === it.row) { last.items.push(it); last.pair = true; }\n        else stackRows.push({ row: it.row, items: [it], pair: false });\n      });\n      stackRows.forEach(r => { r.cls = r.pair ? 'stackrow pairrow' : 'stackrow'; });\n      project = { ...cur, num: String(i+1).padStart(2,'0'), toolstr: cur.tools.join(', '), coverList: cur.coverImg ? [cur.coverImg] : [], noCover: !cur.coverImg, galleryItems, galStack: !!cur.galStack, galCarousel: !!cur.galCarousel, galGrid: !cur.galStack && !cur.galCarousel, stackRows };\n      if (cur.galCarousel){\n        const n = galleryItems.length;\n        const idx = ((this.state.slide % n) + n) % n;\n        project.slide = galleryItems[idx];\n        project.slideList = galleryItems.length ? [galleryItems[idx]] : [];\n        project.slideNum = String(idx+1).padStart(2,'0');\n        project.slideTotal = String(n).padStart(2,'0');\n        project.slidePrev = () => this.setState(s => ({ slide: s.slide - 1 }));\n        project.slideNext = () => this.setState(s => ({ slide: s.slide + 1 }));\n      }\n      if (cur.playable){\n        const on = !!this.state.gameOn;\n        project.gameOn = on;\n        project.gameOff = !on;\n        project.gameSrcList = on ? ['game/PawtionShop.html'] : [];\n        project.gameBtnLabel = on ? '× Close game' : '▶ Play game';\n        project.toggleGame = () => this.setState(s => ({ gameOn: !s.gameOn }));\n      }\n      nextProject = nx;\n      openNext = () => this.open(nx.slug);\n    }\n    return {\n      isHome: this.state.route === 'home',\n      isProject: this.state.route === 'project',\n      year: new Date().getFullYear(),\n      goHome: () => this.goHome(),\n      goWork: () => this.goSection('work'),\n      goAbout: () => this.goSection('about'),\n      goContact: () => this.goSection('contact'),\n      filters: filters.map(f => ({ label:f, cls: f===active ? 'chip chip-on' : 'chip', on: () => this.setState({ filter:f }) })),\n      projects, skills: this.skills, experience: this.experience, education: this.education,\n      project, nextProject, openNext,\n      lightboxList: this.state.lightbox ? [this.state.lightbox] : [],\n      openLightbox: (e) => { const s = e.currentTarget.getAttribute('src'); if (s) this.setState({ lightbox: s }); },\n      closeLightbox: () => this.setState({ lightbox: null }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
